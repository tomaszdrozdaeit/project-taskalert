<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="TaskAlert — Inteligentny system przypomnień i alertów terminowych. Zarządzaj polisami, przeglądami, badaniami i szkoleniami.">
    <meta name="theme-color" content="#4f8cff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>TaskAlert — System Przypomnień</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ============================================================ -->
    <!-- EKRAN LOGOWANIA                                              -->
    <!-- ============================================================ -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-brand">
                <div class="login-logo">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="48" height="48" rx="12" fill="url(#logo-grad)"/>
                        <path d="M14 24l7 7 13-13" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="36" cy="14" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/>
                        <defs>
                            <linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48">
                                <stop stop-color="#4f8cff"/>
                                <stop offset="1" stop-color="#7c3aed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="login-title">TaskAlert</h1>
                <p class="login-subtitle">System przypomnień i alertów terminowych</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" autocomplete="on">
                <div class="form-group">
                    <label for="login-email">Adres e-mail</label>
                    <input type="email" id="login-email" name="email" placeholder="twoj@email.pl" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Hasło</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle" aria-label="Pokaż hasło">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    <span>Zaloguj się</span>
                </button>
                <button type="button" class="btn-link" id="forgot-password-link">Nie pamiętam hasła</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" style="display:none" autocomplete="on">
                <div class="form-group">
                    <label for="register-name">Imię i nazwisko</label>
                    <input type="text" id="register-name" name="name" placeholder="Jan Kowalski" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="register-email">Adres e-mail</label>
                    <input type="email" id="register-email" name="email" placeholder="twoj@email.pl" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="register-password">Hasło</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" name="password" placeholder="Min. 6 znaków" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Pokaż hasło">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-password2">Powtórz hasło</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password2" name="password2" placeholder="Powtórz hasło" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" aria-label="Pokaż hasło">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                    <span>Utwórz konto</span>
                </button>
            </form>

            <!-- Reset Password Form -->
            <form id="reset-form" class="auth-form" style="display:none">
                <p class="form-info">Podaj adres e-mail powiązany z kontem. Wyślemy link do resetowania hasła.</p>
                <div class="form-group">
                    <label for="reset-email">Adres e-mail</label>
                    <input type="email" id="reset-email" name="email" placeholder="twoj@email.pl" required autocomplete="email">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="reset-btn">
                    <span>Wyślij link resetujący</span>
                </button>
            </form>

            <div class="auth-switch">
                <span id="auth-switch-text">Nie masz konta?</span>
                <button type="button" class="btn-link" id="auth-switch-btn">Zarejestruj się</button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- GŁÓWNA APLIKACJA (widoczna po zalogowaniu)                   -->
    <!-- ============================================================ -->
    <div id="app-wrapper" class="app-wrapper" style="display:none">

        <!-- Mobile Top Bar -->
        <header class="topbar">
            <button class="topbar-menu-btn" id="sidebar-toggle" aria-label="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="topbar-brand">
                <svg class="topbar-logo" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#tb-grad)"/><path d="M14 24l7 7 13-13" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="36" cy="14" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/><defs><linearGradient id="tb-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#4f8cff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs></svg>
                <span>TaskAlert</span>
            </div>
            <div class="topbar-actions">
                <button class="topbar-btn theme-toggle-btn" id="theme-toggle-topbar" aria-label="Zmień motyw">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <div class="topbar-avatar" id="topbar-avatar">
                    <span id="topbar-avatar-letter">U</span>
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <svg class="sidebar-logo" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#sb-grad)"/><path d="M14 24l7 7 13-13" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="36" cy="14" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/><defs><linearGradient id="sb-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#4f8cff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs></svg>
                    <div>
                        <h2 class="sidebar-title">TaskAlert</h2>
                        <span class="sidebar-version">v1.0</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Pulpit</span>
                    <span class="nav-badge nav-badge-danger" id="badge-urgent" style="display:none">0</span>
                </a>
                <div class="nav-divider"><span>Moduły alertów</span></div>
                <a href="#samochody" class="nav-item" data-page="samochody">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17h14M5 17a2 2 0 01-2-2V7a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2M5 17l-1 3h2m12-3l1 3h-2"/><circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/></svg>
                    <span>Samochody</span>
                </a>
                <a href="#kadry" class="nav-item" data-page="kadry">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                    <span>Kadry</span>
                </a>
                <a href="#inne" class="nav-item" data-page="inne">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>Inne</span>
                </a>
                <div class="nav-divider"><span>System</span></div>
                <a href="#kategorie" class="nav-item" data-page="kategorie">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <span>Kategorie</span>
                </a>
                <a href="#historia" class="nav-item" data-page="historia">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Historia</span>
                </a>
                <a href="#ustawienia" class="nav-item" data-page="ustawienia">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span>Ustawienia</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar" id="sidebar-avatar">
                        <span id="sidebar-avatar-letter">U</span>
                    </div>
                    <div class="sidebar-user-info">
                        <span class="sidebar-user-name" id="sidebar-user-name">Użytkownik</span>
                        <span class="sidebar-user-email" id="sidebar-user-email">email@example.com</span>
                    </div>
                </div>
                <div class="sidebar-footer-actions">
                    <button class="btn-icon theme-toggle-btn" id="theme-toggle-sidebar" aria-label="Zmień motyw">
                        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <button class="btn-icon" id="logout-btn" aria-label="Wyloguj się" title="Wyloguj się">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content" id="app-content">
            <div class="page-loader" id="page-loader">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- FAB — Szybkie dodawanie -->
        <button class="fab" id="fab-add" title="Dodaj nowe przypomnienie" aria-label="Dodaj nowe przypomnienie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </div>

    <!-- ============================================================ -->
    <!-- MODAL CONTAINER                                               -->
    <!-- ============================================================ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Tytuł</h3>
                <button class="modal-close" id="modal-close" aria-label="Zamknij">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- TOAST CONTAINER                                               -->
    <!-- ============================================================ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                       -->
    <!-- ============================================================ -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
